<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

        .btn-danger-custom { background: #ef4444; border: none; color: #fff; font-weight: 600; padding: 6px 16px; border-radius: 8px; transition: all 0.3s ease; font-size: 0.8rem; }
        .btn-danger-custom:hover { background: #dc2626; color: #fff; transform: translateY(-1px); }
        .btn-warning-custom { background: #fbbf24; border: none; color: #0b1120; font-weight: 600; padding: 6px 16px; border-radius: 8px; transition: all 0.3s ease; font-size: 0.8rem; }
        .btn-warning-custom:hover { background: #f59e0b; color: #fff; transform: translateY(-1px); }
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);

            font-weight: 600;

        .btn-copy {

        .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .badge-approved { background: rgba(46,204,113,0.15); color: #2ecc71; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .badge-rejected { background: rgba(239,68,68,0.15); color: #f87171; padding: 4px 12px; border-radius: 20px; font-weight: 500; }

        .search-box {

        }
        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.15) !important;
            background: rgba(8,14,26,0.9) !important;
        }
        .form-control-custom::placeholder { color: #556688 !important; }
        .form-label { font-weight: 600; color: #a0b8d0; font-size: 0.9rem; margin-bottom: 6px; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(46,204,113,0.06);
        }
        .info-row .label { color: #8899bb; font-size: 0.85rem; }
        .info-row .value { color: #f0f4ff; font-weight: 500; font-size: 0.95rem; }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }
        .toast-custom {
            background: rgba(19,34,55,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;

        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom i { font-size: 1.5rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
        
        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
        }
        .password-screen .card-glass { max-width: 420px; width: 100%; padding: 2.5rem; }
        .password-screen .logo-text { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .password-screen .logo-text span { color: #2ecc71; }
        .password-screen .logo-text .admin-badge {
            font-size: 0.7rem;
            background: rgba(239,68,68,0.15);
            color: #f87171;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .error-shake { animation: shake 0.5s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        
        .db-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;

        }
        .db-status.connected { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .db-status.error { background: rgba(239,68,68,0.15); color: #f87171; }
        .db-status.loading { background: rgba(251,191,36,0.15); color: #fbbf24; }
        
        .wallet-address-cell {
            font-family: monospace;
            font-size: 0.7rem;
            color: #60a5fa;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
        }
        
        .no-data {
            text-align: center;
            padding: 40px 20px;
        }
        .no-data i { font-size: 3rem; color: #556688; margin-bottom: 15px; }
        .no-data p { color: #8899bb; }
        
        @media (max-width: 768px) {
            .dashboard-container { padding: 15px; }
            .search-box { max-width: 100%; }
            .table-responsive { font-size: 0.8rem; }
            .stat-card .stat-number { font-size: 1.3rem; }
            .wallet-address-cell { max-width: 80px; }
        }
        @media (max-width: 480px) { .card-glass { padding: 1rem; } }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ====== PASSWORD SCREEN ====== -->
<div class="password-screen" id="passwordScreen">
    <div class="card-glass text-center">
        <div class="logo-text mb-3">
            <i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span>

<!-- ====== NAVBAR ====== -->
<nav class="navbar navbar-custom" id="mainNav" style="display:none;">
    <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-currency-bitcoin me-2"></i>RND Staking

        </a>

<!-- ====== ADMIN CONTENT ====== -->
<div class="dashboard-container" id="adminContent" style="display:none;">
    <div class="loading-spinner">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="text-muted mt-3">Loading admin panel...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth, onAuthStateChanged } from "firebase/auth";
import { getDatabase, ref, get, update, set, onValue, remove } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const ADMIN_PASSWORD = "123@Admin";

let currentTab = 'dashboard';
let allUsers = {};
let allDeposits = {};
let allWithdrawals = {};
let allSettings = { rate: 1.00 };
let isDataLoaded = false;
let dataListeners = {};

// ============================================================
// 🔥 TOAST
// ============================================================
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

// ============================================================
// 🔥 COPY
// ============================================================
window.copyAddress = function(address, label = 'Address') {
    if (!address || address === 'N/A') {
        showToast('❌ No address to copy!', 'error');
        return;
    }
    navigator.clipboard.writeText(address).then(() => {
        showToast(`✅ ${label} copied to clipboard!`, 'success');
    }).catch(() => {
        const textArea = document.createElement('textarea');
        textArea.value = address;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast(`✅ ${label} copied to clipboard!`, 'success');
    });
};

// ============================================================
// 🔥 PASSWORD
// ============================================================
function checkPassword() {
    const saved = sessionStorage.getItem('admin_authenticated');
    if (saved === 'true') {
        document.getElementById('passwordScreen').style.display = 'none';
        document.getElementById('mainNav').style.display = 'flex';
        document.getElementById('adminContent').style.display = 'block';
        loadAdminPanel();
    }
}

document.getElementById('passwordForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const input = document.getElementById('adminPasswordInput');
    
    if (input.value === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_authenticated', 'true');
        document.getElementById('passwordScreen').style.display = 'none';
        document.getElementById('mainNav').style.display = 'flex';
        document.getElementById('adminContent').style.display = 'block';
        showToast('✅ Access Granted! Welcome Admin.', 'success');
        loadAdminPanel();
    } else {
        input.classList.add('error-shake');
        setTimeout(() => input.classList.remove('error-shake'), 500);
        input.value = '';
        input.focus();
        showToast('❌ Incorrect Password! Please try again.', 'error');
    }
});

document.getElementById('logoutBtn').addEventListener('click', function() {
    sessionStorage.removeItem('admin_authenticated');
    document.getElementById('passwordScreen').style.display = 'flex';
    document.getElementById('mainNav').style.display = 'none';
    document.getElementById('adminContent').style.display = 'none';
    document.getElementById('adminPasswordInput').value = '';
    document.getElementById('adminPasswordInput').focus();
    showToast('🔒 Logged out successfully.', 'success');
});

// ============================================================
// 🔥 FETCH ALL DATA - INCLUDES USER TRANSACTIONS
// ============================================================
function setupRealtimeListeners() {
    for (let key in dataListeners) {
        if (dataListeners[key]) {
            dataListeners[key]();
        }
    }
    dataListeners = {};
    
    // Users listener
    const usersRef = ref(db, 'users');
    dataListeners.users = onValue(usersRef, (snapshot) => {
        if (snapshot.exists()) {
            allUsers = snapshot.val();
            console.log('✅ Users loaded:', Object.keys(allUsers).length);
            // Extract deposits and withdrawals from user transactions
            extractTransactionsFromUsers();
        } else {
            allUsers = {};
            allDeposits = {};
            allWithdrawals = {};
            console.log('⚠️ No users found');
        }
        if (isDataLoaded) renderDashboard();
    });

    // Settings listener
    const settingsRef = ref(db, 'settings');
    dataListeners.settings = onValue(settingsRef, (snapshot) => {
        if (snapshot.exists()) {
            allSettings = snapshot.val();
            console.log('✅ Settings loaded:', allSettings);
        } else {
            allSettings = { rate: 1.00 };
        }
        if (isDataLoaded) {
            const rateInput = document.getElementById('rndRate');
            const rateDisplay = document.getElementById('currentRateDisplay');
            if (rateInput && allSettings.rate) {
                rateInput.value = allSettings.rate;
                if (rateDisplay) rateDisplay.textContent = allSettings.rate;
            }
            renderDashboard();
        }
    });
}

// ============================================================
// 🔥 EXTRACT TRANSACTIONS FROM USERS
// ============================================================
function extractTransactionsFromUsers() {
    allDeposits = {};
    allWithdrawals = {};
    
    for (let uid in allUsers) {
        const user = allUsers[uid];
        if (user.role === 'admin') continue;
        
        // Extract from transactions node
        const transactions = user.transactions || {};
        for (let txId in transactions) {
            const tx = transactions[txId];
            
            // Check if it's a deposit
            if (tx.type === 'deposit' || tx.type === 'deposit_verified') {
                // Check if already exists in deposits
                const exists = Object.values(allDeposits).some(d => d.txHash === tx.txHash && d.uid === uid);
                if (!exists) {
                    const depKey = 'dep_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                    allDeposits[depKey] = {
                        uid: uid,
                        amount: tx.amount || 0,
                        timestamp: tx.timestamp || Date.now(),
                        status: tx.status || 'approved',
                        txHash: tx.txHash || '',
                        blockNumber: tx.blockNumber || 0,
                        confirmations: tx.confirmations || 0,
                        from: tx.from || '',
                        to: tx.to || '',
                        description: tx.description || ''
                    };
                }
            }
            
            // Check if it's a withdrawal
            if (tx.type === 'withdrawal') {
                const wKey = 'wd_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                allWithdrawals[wKey] = {
                    uid: uid,
                    amount: tx.amount || 0,
                    currency: tx.currency || 'RND',
                    timestamp: tx.timestamp || Date.now(),
                    status: tx.status || 'pending',
                    wallet: tx.wallet || '',
                    walletType: tx.walletType || '',
                    description: tx.description || ''
                };
            }
        }
        
        // Also check packages
        const packages = user.packages || {};
        for (let pkgId in packages) {
            const pkg = packages[pkgId];
            // Add as a transaction for display
            const depKey = 'pkg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
            allDeposits[depKey] = {
                uid: uid,
                amount: pkg.usdtAmount || 0,
                timestamp: pkg.timestamp || Date.now(),
                status: pkg.status === 'active' ? 'approved' : 'completed',
                txHash: pkg.planName || 'Package',
                blockNumber: 0,
                confirmations: 0,
                from: 'System',
                to: uid,
                description: `${pkg.planName || 'Package'} - ${pkg.bonusPercent || 0}% Bonus | ${(pkg.totalRND || 0).toFixed(2)} RND`,
                isPackage: true,
                packageData: pkg
            };
        }
    }
    
    console.log('✅ Extracted deposits:', Object.keys(allDeposits).length);
    console.log('✅ Extracted withdrawals:', Object.keys(allWithdrawals).length);
}

async function loadAdminPanel() {
    try {
        setupRealtimeListeners();
        
        await new Promise((resolve) => {
            let attempts = 0;
            const checkData = () => {
                attempts++;
                const hasData = Object.keys(allUsers).length > 0;
                if (hasData || attempts > 15) {
                    isDataLoaded = true;
                    resolve();
                } else {
                    setTimeout(checkData, 500);
                }
            };
            checkData();
        });
        
        renderDashboard();
        
    } catch (error) {
        console.error('Error loading admin:', error);
        document.getElementById('adminContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>

function renderDashboardTab() {
    let recentActivity = [];
    
    for (let key in allDeposits) {
        const d = allDeposits[key];
        const user = allUsers[d.uid] || { name: 'Unknown' };
        recentActivity.push({
            type: 'deposit',
            user: user.name || 'Unknown',
            amount: d.amount || 0,
            status: d.status || 'pending',
            timestamp: d.timestamp || 0,
            label: d.isPackage ? 'Package' : 'Deposit'
        });
    }
    
    for (let key in allWithdrawals) {
        const w = allWithdrawals[key];
        const user = allUsers[w.uid] || { name: 'Unknown' };
        recentActivity.push({
            type: 'withdrawal',
            user: user.name || 'Unknown',
            amount: w.amount || 0,
            status: w.status || 'pending',
            timestamp: w.timestamp || 0,
            label: 'Withdrawal'
        });
    }
    
    recentActivity.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    recentActivity = recentActivity.slice(0, 15);

    if (recentActivity.length === 0) {
        return `
            <div class="card-glass">
                <div class="card-title"><i class="bi bi-clock-history text-success me-2"></i>Recent Activity</div>
                <div class="no-data">
                    <i class="bi bi-inbox"></i>
                    <p>No recent activity</p>
                </div>
            </div>
        `;
    }

    return `
        <div class="card-glass">
            <div class="card-title"><i class="bi bi-clock-history text-success me-2"></i>Recent Activity</div>
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>User</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${recentActivity.map(item => `
                            <tr>
                                <td>
                                    ${item.type === 'deposit' ? '<i class="bi bi-arrow-down-circle text-success"></i> ' + (item.label || 'Deposit') : '<i class="bi bi-arrow-up-circle text-warning"></i> Withdrawal'}
                                </td>
                                <td><strong>${item.user}</strong></td>
                                <td>
                                    <strong style="color:${item.type === 'deposit' ? '#2ecc71' : '#fbbf24'}">

                                    </strong>
                                </td>
                                <td>
                                    <span class="${item.status === 'pending' ? 'badge-pending' : item.status === 'approved' || item.status === 'success' ? 'badge-approved' : 'badge-rejected'}">

                </table>
            </div>
        </div>
    `;
}

window.viewUserDetails = function(userId) {
    const user = allUsers[userId];
    if (!user) {
        showToast('❌ User not found!', 'error');
        return;
    }
    
    const packages = user.packages || {};
    let totalReleased = 0;
    let totalLocked = 0;
    for (let key in packages) {
        const p = packages[key];
        totalReleased += (p.releasedAmount || 0);
        totalLocked += ((p.totalRND || 0) - (p.releasedAmount || 0));
    }
    
    // Count user's transactions
    const transactions = user.transactions || {};
    const depositCount = Object.values(transactions).filter(t => t.type === 'deposit' || t.type === 'deposit_verified').length;
    const withdrawalCount = Object.values(transactions).filter(t => t.type === 'withdrawal').length;
    
    alert(`📊 User Details
━━━━━━━━━━━━━━━━━━━━━━
👤 Name: ${user.name || 'Unknown'}
📛 Username: ${user.username || 'N/A'}
📧 Email: ${user.email || 'N/A'}
━━━━━━━━━━━━━━━━━━━━━━
💰 Deposit Wallet: $${(user.depositWallet || 0).toFixed(2)}
📊 RND Wallet: ${(user.rndWallet || 0).toFixed(4)}
🔒 Locked RND: ${(user.lockedRND || 0).toFixed(2)}
━━━━━━━━━━━━━━━━━━━━━━
📦 Packages: ${Object.keys(packages).length}
✅ Released: ${totalReleased.toFixed(2)} RND
🔒 Locked: ${totalLocked.toFixed(2)} RND
━━━━━━━━━━━━━━━━━━━━━━
📥 Deposits: ${depositCount}
📤 Withdrawals: ${withdrawalCount}
👥 Referrals: ${user.totalReferrals || 0}
🏆 Referral Earnings: ${(user.referralEarnings || 0).toFixed(2)}
🚫 Banned: ${user.banned ? 'Yes' : 'No'}`);
};

// 🔥 RENDER PACKAGES TAB
// ============================================================
function renderPackagesTab() {
    let allPackages = [];
    
    for (let uid in allUsers) {
        const user = allUsers[uid];
        if (user.role === 'admin') continue;
        const packages = user.packages || {};
        for (let pkgId in packages) {
            const pkg = packages[pkgId];
            allPackages.push({
                id: pkgId,
                uid: uid,
                user: user,
                ...pkg
            });
        }
    }
    
    if (allPackages.length === 0) {
        return `
            <div class="card-glass">
                <div class="no-data">
                    <i class="bi bi-inbox"></i>
                    <p>No packages found.</p>
                </div>
            </div>
        `;
    }

    allPackages.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

    let html = `
        <div class="card-glass">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
                <div class="card-title" style="margin-bottom:0;"><i class="bi bi-box-seam text-success me-2"></i>All Packages (${allPackages.length})</div>
                <input type="text" class="search-box" placeholder="Search by user..." oninput="filterPackages(this.value)">
            </div>
            <div class="table-responsive">
                <table class="table table-custom" id="packagesTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>User</th>
                            <th>Plan</th>
                            <th>Amount</th>
                            <th>Total RND</th>
                            <th>Released</th>
                            <th>Locked</th>
                            <th>Daily</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
    `;

    let count = 0;
    for (let pkg of allPackages) {
        count++;
        const statusClass = pkg.status === 'active' ? 'badge-active' : 'badge-completed';
        const statusText = pkg.status === 'active' ? '🟢 Active' : '🔵 Completed';
        const released = pkg.releasedAmount || 0;
        const locked = Math.max(0, (pkg.totalRND || 0) - released);
        
        html += `
            <tr data-user="${(pkg.user.username || pkg.user.name || '').toLowerCase()}">
                <td>${count}</td>
                <td>
                    <strong>${pkg.user.name || 'Unknown'}</strong><br>
                    <small style="color:#556688;">${pkg.user.username || 'N/A'}</small>
                </td>
                <td style="color:#fbbf24;">${pkg.planName || 'Package'}</td>
                <td><strong style="color:#2ecc71;">$${pkg.usdtAmount || 0}</strong></td>
                <td><strong style="color:#60a5fa;">${(pkg.totalRND || 0).toFixed(2)}</strong></td>
                <td style="color:#34d399;">${released.toFixed(2)}</td>
                <td style="color:#a78bfa;">${locked.toFixed(2)}</td>
                <td style="color:#fbbf24;">${(pkg.dailyRelease || 0).toFixed(4)}</td>
                <td><span class="${statusClass}">${statusText}</span></td>
            </tr>
        `;
    }

    html += `</tbody></table></div></div>`;
    return html;
}

// ============================================================
// 🔥 RENDER SETTINGS TAB
// ============================================================
function renderSettingsTab() {
    const currentRate = allSettings.rate || 1.00;
    
    let totalUsers = 0;
    let totalDepositWallet = 0;
    let totalRNDWallet = 0;
    let totalLockedRND = 0;
    
    for (let key in allUsers) {
        const u = allUsers[key];
        if (u.role === 'admin') continue;
        totalUsers++;
        totalDepositWallet += (u.depositWallet || 0);
        totalRNDWallet += (u.rndWallet || 0);
        totalLockedRND += (u.lockedRND || 0);
    }
    
    return `
        <div class="card-glass">
            <div class="card-title"><i class="bi bi-gear text-success me-2"></i>Admin Settings</div>
            
            <form id="settingsForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">RND Token Rate (USD)</label>
                        <input type="number" id="rndRate" class="form-control form-control-custom" step="0.0001" value="${currentRate}" required>
                        <small class="text-muted">Current rate: 1 RND = $<span id="currentRateDisplay">${currentRate}</span></small>
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <button type="submit" class="btn-primary-custom" id="saveSettingsBtn">
                            <i class="bi bi-save me-2"></i>Update Rate
                        </button>
                    </div>
                </div>
            </form>

            <hr class="border-secondary">

            <div class="row g-3">
                <div class="col-md-6">
                    <h6 class="text-muted">📊 Platform Stats</h6>
                    <div class="info-row"><span class="label">Total Users</span><span class="value">${totalUsers}</span></div>
                    <div class="info-row"><span class="label">Total Deposits</span><span class="value">${Object.keys(allDeposits || {}).length}</span></div>
                    <div class="info-row"><span class="label">Total Withdrawals</span><span class="value">${Object.keys(allWithdrawals || {}).length}</span></div>
                    <div class="info-row"><span class="label">Total Deposit Wallet</span><span class="value" style="color:#2ecc71;">$${totalDepositWallet.toFixed(2)}</span></div>
                    <div class="info-row"><span class="label">Total RND Wallet</span><span class="value" style="color:#60a5fa;">${totalRNDWallet.toFixed(2)}</span></div>
                    <div class="info-row"><span class="label">Total Locked RND</span><span class="value" style="color:#a78bfa;">${totalLockedRND.toFixed(2)}</span></div>
                </div>
                <div class="col-md-6">
                    <h6 class="text-muted">🔐 Security</h6>
                    <div class="info-row"><span class="label">Admin Status</span><span class="value"><i class="bi bi-check-circle text-success"></i> Active</span></div>
                    <div class="info-row"><span class="label">Session Time</span><span class="value">${new Date().toLocaleString('hi-IN')}</span></div>
                    <div class="info-row"><span class="label">Database</span><span class="value"><i class="bi bi-check-circle text-success"></i> Connected</span></div>
                </div>
            </div>
        </div>
    `;
}

// ============================================================
// 🔥 WITHDRAWAL ACTIONS - MANUAL APPROVAL
// ============================================================
window.approveWithdrawal = async function(withdrawalId) {
    if (!confirm('✅ Approve this withdrawal?')) return;
    try {
        const withdrawal = allWithdrawals[withdrawalId];
        if (!withdrawal) { showToast('❌ Withdrawal not found!', 'error'); return; }
        
        // Update in user's transactions
        const userRef = ref(db, 'users/' + withdrawal.uid);
        const userSnap = await get(userRef);
        if (!userSnap.exists()) { showToast('❌ User not found!', 'error'); return; }
        
        const userData = userSnap.val();
        const transactions = userData.transactions || {};
        
        // Find the withdrawal transaction and update status
        let found = false;
        for (let key in transactions) {
            if (transactions[key].type === 'withdrawal' && 
                transactions[key].amount === withdrawal.amount && 
                Math.abs((transactions[key].timestamp || 0) - (withdrawal.timestamp || 0)) < 5000) {
                transactions[key].status = 'approved';
                found = true;
                break;
            }
        }
        
        if (!found) {
            // If not found in transactions, just update the withdrawal record
            await update(ref(db, 'withdrawals/' + withdrawalId), { status: 'approved' });
        } else {
            await update(ref(db, 'users/' + withdrawal.uid), { transactions: transactions });
        }
        
        showToast('✅ Withdrawal approved!', 'success');
        // Refresh data
        extractTransactionsFromUsers();
        renderDashboard();
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
    }
};

window.rejectWithdrawal = async function(withdrawalId) {
    if (!confirm('❌ Reject this withdrawal?')) return;
    try {
        const withdrawal = allWithdrawals[withdrawalId];
        if (!withdrawal) { showToast('❌ Withdrawal not found!', 'error'); return; }
        
        // Update in user's transactions
        const userRef = ref(db, 'users/' + withdrawal.uid);
        const userSnap = await get(userRef);
        if (!userSnap.exists()) { showToast('❌ User not found!', 'error'); return; }
        
        const userData = userSnap.val();
        const transactions = userData.transactions || {};
        
        let found = false;
        for (let key in transactions) {
            if (transactions[key].type === 'withdrawal' && 
                transactions[key].amount === withdrawal.amount && 
                Math.abs((transactions[key].timestamp || 0) - (withdrawal.timestamp || 0)) < 5000) {
                transactions[key].status = 'rejected';
                found = true;
                break;
            }
        }
        
        if (!found) {
            await update(ref(db, 'withdrawals/' + withdrawalId), { status: 'rejected' });
        } else {
            await update(ref(db, 'users/' + withdrawal.uid), { transactions: transactions });
        }
        
        showToast('❌ Withdrawal rejected.', 'success');
        extractTransactionsFromUsers();
        renderDashboard();
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
    }
};

window.reverseWithdrawal = async function(withdrawalId) {
    if (!confirm('🔄 Reverse this withdrawal?')) return;
    try {
        const withdrawal = allWithdrawals[withdrawalId];
        if (!withdrawal) { showToast('❌ Withdrawal not found!', 'error'); return; }
        
        // Add amount back to user's wallet
        const userRef = ref(db, 'users/' + withdrawal.uid);
        const userSnap = await get(userRef);
        if (!userSnap.exists()) { showToast('❌ User not found!', 'error'); return; }
        
        const userData = userSnap.val();
        const walletType = withdrawal.walletType || 'withdrawalWallet';
        const currentBalance = userData[walletType] || 0;
        const newBalance = currentBalance + (withdrawal.amount || 0);
        
        await update(userRef, { [walletType]: newBalance });
        
        // Update status
        const transactions = userData.transactions || {};
        for (let key in transactions) {
            if (transactions[key].type === 'withdrawal' && 
                transactions[key].amount === withdrawal.amount && 
                Math.abs((transactions[key].timestamp || 0) - (withdrawal.timestamp || 0)) < 5000) {
                transactions[key].status = 'pending';
                break;
            }
        }
        await update(ref(db, 'users/' + withdrawal.uid), { transactions: transactions });
        
        showToast('🔄 Withdrawal reversed.', 'success');
        extractTransactionsFromUsers();
        renderDashboard();
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
    }
};

// ============================================================
// 🔥 SAVE SETTINGS
// ============================================================
async function saveSettings() {
    const rateInput = document.getElementById('rndRate');
    if (!rateInput) {
        showToast('❌ Settings form not found!', 'error');
        return;
    }
    
    const rate = parseFloat(rateInput.value);
    if (!rate || rate <= 0) {
        showToast('❌ Please enter a valid rate.', 'error');
        return;
    }
    
    const btn = document.getElementById('saveSettingsBtn');
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
    }
    
    try {
        await set(ref(db, 'settings/rate'), rate);
        const display = document.getElementById('currentRateDisplay');
        if (display) display.textContent = rate;
        showToast('✅ RND rate updated to $' + rate, 'success');
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
    }
    
    if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-save me-2"></i>Update Rate';
    }
}
