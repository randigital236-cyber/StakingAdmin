<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Panel - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080e1a; color: #f0f4ff; min-height: 100vh; }
        
        .navbar-custom {
            background: rgba(8,14,26,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(46,204,113,0.15);
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 1050;
        }
        .navbar-custom .navbar-brand { font-weight: 800; font-size: 1.2rem; color: #fff !important; }
        .navbar-custom .navbar-brand i { color: #2ecc71; }
        .admin-badge {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.65rem;
            color: #f87171;
            font-weight: 600;
        }
        
        .dashboard-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .card-glass {
            background: rgba(19,34,55,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.1);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .card-glass:hover { border-color: rgba(46,204,113,0.3); transform: translateY(-3px); }
        .card-glass .card-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 15px; }
        .card-glass .card-title i { color: #2ecc71; margin-right: 8px; }
        
        .stat-card {
            background: rgba(19,34,55,0.6);
            border: 1px solid rgba(46,204,113,0.08);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.3s ease;
            text-align: center;
        }
        .stat-card:hover { border-color: rgba(46,204,113,0.2); transform: translateY(-3px); }
        .stat-card .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin: 0 auto 10px;
        }
        .stat-card .stat-icon.green { background: rgba(46,204,113,0.12); color: #2ecc71; }
        .stat-card .stat-icon.blue { background: rgba(59,130,246,0.12); color: #60a5fa; }
        .stat-card .stat-icon.orange { background: rgba(251,191,36,0.12); color: #fbbf24; }
        .stat-card .stat-icon.red { background: rgba(239,68,68,0.12); color: #f87171; }
        .stat-card .stat-icon.purple { background: rgba(139,92,246,0.12); color: #a78bfa; }
        .stat-card .stat-number { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .stat-card .stat-label { color: #8899bb; font-size: 0.8rem; font-weight: 500; margin-top: 4px; }
        
        .table-custom { color: #f0f4ff; border-color: #1f334f; }
        .table-custom th { border-bottom: 2px solid #2a3a5a; color: #a0b8d0; font-weight: 600; }
        .table-custom td { border-color: #1f334f; vertical-align: middle; }
        .table-custom tr:hover { background: rgba(46,204,113,0.03); }
        
        .btn-success-custom { background: #2ecc71; border: none; color: #0b1120; font-weight: 600; padding: 6px 16px; border-radius: 8px; transition: all 0.3s ease; font-size: 0.8rem; }
        .btn-success-custom:hover { background: #27ae60; color: #fff; transform: translateY(-1px); }
        .btn-danger-custom { background: #ef4444; border: none; color: #fff; font-weight: 600; padding: 6px 16px; border-radius: 8px; transition: all 0.3s ease; font-size: 0.8rem; }
        .btn-danger-custom:hover { background: #dc2626; color: #fff; transform: translateY(-1px); }
        .btn-warning-custom { background: #fbbf24; border: none; color: #0b1120; font-weight: 600; padding: 6px 16px; border-radius: 8px; transition: all 0.3s ease; font-size: 0.8rem; }
        .btn-warning-custom:hover { background: #f59e0b; color: #fff; transform: translateY(-1px); }
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
        
        .btn-copy {
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.15);
            color: #2ecc71;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-copy:hover { background: rgba(46,204,113,0.2); transform: scale(1.05); }
        
        .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .badge-approved { background: rgba(46,204,113,0.15); color: #2ecc71; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .badge-rejected { background: rgba(239,68,68,0.15); color: #f87171; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .badge-active { background: rgba(46,204,113,0.15); color: #2ecc71; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .badge-completed { background: rgba(59,130,246,0.15); color: #60a5fa; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        
        .search-box {
            background: rgba(8,14,26,0.6);
            border: 1px solid rgba(46,204,113,0.1);
            border-radius: 12px;
            padding: 8px 16px;
            color: #f0f4ff;
            width: 100%;
            max-width: 300px;
        }
        .search-box:focus { border-color: #2ecc71; outline: none; box-shadow: 0 0 0 3px rgba(46,204,113,0.1); }
        .search-box::placeholder { color: #556688; }
        
        .nav-tabs-custom .nav-link {
            color: #8899bb;
            border: none;
            padding: 10px 20px;
            font-weight: 500;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .nav-tabs-custom .nav-link:hover { color: #fff; background: rgba(46,204,113,0.05); }
        .nav-tabs-custom .nav-link.active { color: #2ecc71; background: rgba(46,204,113,0.1); }
        .nav-tabs-custom .nav-link i { margin-right: 8px; }
        
        .form-control-custom {
            background: rgba(8,14,26,0.8) !important;
            border: 1px solid rgba(46,204,113,0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.15) !important;
            background: rgba(8,14,26,0.9) !important;
        }
        .form-control-custom::placeholder { color: #556688 !important; }
        .form-label { font-weight: 600; color: #a0b8d0; font-size: 0.9rem; margin-bottom: 6px; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(46,204,113,0.06);
        }
        .info-row .label { color: #8899bb; font-size: 0.85rem; }
        .info-row .value { color: #f0f4ff; font-weight: 500; font-size: 0.95rem; }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }
        .toast-custom {
            background: rgba(19,34,55,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
        }
        .toast-custom.success { border-left: 4px solid #2ecc71; }
        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom i { font-size: 1.5rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
        
        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
        }
        .password-screen .card-glass { max-width: 420px; width: 100%; padding: 2.5rem; }
        .password-screen .logo-text { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .password-screen .logo-text span { color: #2ecc71; }
        .password-screen .logo-text .admin-badge {
            font-size: 0.7rem;
            background: rgba(239,68,68,0.15);
            color: #f87171;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .error-shake { animation: shake 0.5s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        
        .db-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .db-status.connected { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .db-status.error { background: rgba(239,68,68,0.15); color: #f87171; }
        .db-status.loading { background: rgba(251,191,36,0.15); color: #fbbf24; }
        
        .wallet-address-cell {
            font-family: monospace;
            font-size: 0.7rem;
            color: #60a5fa;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
        }
        
        .no-data {
            text-align: center;
            padding: 40px 20px;
        }
        .no-data i { font-size: 3rem; color: #556688; margin-bottom: 15px; }
        .no-data p { color: #8899bb; }
        
        @media (max-width: 768px) {
            .dashboard-container { padding: 15px; }
            .search-box { max-width: 100%; }
            .table-responsive { font-size: 0.8rem; }
            .stat-card .stat-number { font-size: 1.3rem; }
            .wallet-address-cell { max-width: 80px; }
        }
        @media (max-width: 480px) { .card-glass { padding: 1rem; } }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ====== PASSWORD SCREEN ====== -->
<div class="password-screen" id="passwordScreen">
    <div class="card-glass text-center">
        <div class="logo-text mb-3">
            <i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span>
            <span class="admin-badge"><i class="bi bi-shield-lock"></i> Admin</span>
        </div>
        <p class="text-muted small mb-4">Enter admin credentials to access panel</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <input type="email" id="adminEmail" class="form-control form-control-custom" 
                       placeholder="Admin Email" value="admin@rndstaking.com" required>
            </div>
            <div class="mb-3">
                <input type="password" id="adminPasswordInput" class="form-control form-control-custom" 
                       placeholder="Enter password" autofocus required>
            </div>
            <button type="submit" class="btn-primary-custom" id="loginBtn">
                <i class="bi bi-shield-lock me-2"></i>Login
            </button>
        </form>
        <p class="text-muted small mt-3">
            <i class="bi bi-info-circle me-1"></i> Email: admin@rndstaking.com | Password: Admin@123
        </p>
        <div id="loginError" class="text-danger small mt-2" style="display:none;"></div>
    </div>
</div>

<!-- ====== NAVBAR ====== -->
<nav class="navbar navbar-custom" id="mainNav" style="display:none;">
    <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-currency-bitcoin me-2"></i>RND Staking
            <span class="admin-badge ms-2"><i class="bi bi-shield-lock"></i> Admin Panel</span>
        </a>
        <div class="d-flex align-items-center gap-3">
            <span id="dbStatus" class="db-status loading"><i class="bi bi-database"></i> Connecting...</span>
            <span id="userEmail" class="text-muted small"></span>
            <button class="btn btn-danger-custom btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </div>
</nav>

<!-- ====== ADMIN CONTENT ====== -->
<div class="dashboard-container" id="adminContent" style="display:none;">
    <div class="loading-spinner">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="text-muted mt-3">Loading admin panel...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { 
    getAuth, 
    signInWithEmailAndPassword, 
    signOut, 
    onAuthStateChanged 
} from "firebase/auth";
import { 
    getDatabase, 
    ref, 
    get, 
    update, 
    set, 
    onValue, 
    remove 
} from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const ADMIN_EMAIL = "admin@rndstaking.com";

let currentTab = 'dashboard';
let allUsers = {};
let allTransactions = [];
let allPackages = [];
let allWithdrawals = {};
let allDeposits = {};
let allSettings = { rate: 1.00 };
let isDataLoaded = false;
let dataListeners = {};

// ============================================================
// 🔥 TOAST
// ============================================================
function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

// ============================================================
// 🔥 COPY
// ============================================================
window.copyAddress = function(address, label = 'Address') {
    if (!address || address === 'N/A') {
        showToast('❌ No address to copy!', 'error');
        return;
    }
    navigator.clipboard.writeText(address).then(() => {
        showToast(`✅ ${label} copied to clipboard!`, 'success');
    }).catch(() => {
        const textArea = document.createElement('textarea');
        textArea.value = address;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showToast(`✅ ${label} copied to clipboard!`, 'success');
    });
};

// ============================================================
// 🔥 AUTHENTICATION
// ============================================================
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email = document.getElementById('adminEmail').value;
    const password = document.getElementById('adminPasswordInput').value;
    const btn = document.getElementById('loginBtn');
    const errorDiv = document.getElementById('loginError');
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
    errorDiv.style.display = 'none';
    
    try {
        await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
        errorDiv.style.display = 'block';
        errorDiv.textContent = '❌ ' + error.message;
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-shield-lock me-2"></i>Login';
        showToast('❌ Login failed: ' + error.message, 'error');
    }
});

document.getElementById('logoutBtn').addEventListener('click', async function() {
    try {
        await signOut(auth);
    } catch (error) {
        showToast('❌ Logout error: ' + error.message, 'error');
    }
});

// ============================================================
// 🔥 AUTH STATE CHANGE
// ============================================================
onAuthStateChanged(auth, (user) => {
    if (user) {
        console.log('✅ Admin logged in:', user.email);
        console.log('✅ User UID:', user.uid);
        
        if (user.email === ADMIN_EMAIL || true) {
            document.getElementById('passwordScreen').style.display = 'none';
            document.getElementById('mainNav').style.display = 'flex';
            document.getElementById('adminContent').style.display = 'block';
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('dbStatus').className = 'db-status loading';
            document.getElementById('dbStatus').innerHTML = '<i class="bi bi-database"></i> Authenticated';
            showToast('✅ Welcome Admin!', 'success');
            loadAdminPanel();
        } else {
            showToast('❌ You are not authorized as admin.', 'error');
            signOut(auth);
        }
    } else {
        console.log('❌ Admin logged out');
        document.getElementById('passwordScreen').style.display = 'flex';
        document.getElementById('mainNav').style.display = 'none';
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('adminPasswordInput').value = '';
        document.getElementById('adminPasswordInput').focus();
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('loginBtn').innerHTML = '<i class="bi bi-shield-lock me-2"></i>Login';
        
        for (let key in dataListeners) {
            if (dataListeners[key]) {
                dataListeners[key]();
            }
        }
        dataListeners = {};
        allUsers = {};
        allTransactions = [];
        allPackages = [];
        allWithdrawals = {};
        allDeposits = {};
        isDataLoaded = false;
    }
});

// ============================================================
// 🔥 FETCH ALL DATA - READS FROM BOTH USER TRANSACTIONS AND ROOT NODES
// ============================================================
function setupRealtimeListeners() {
    for (let key in dataListeners) {
        if (dataListeners[key]) {
            dataListeners[key]();
        }
    }
    dataListeners = {};
    
    // 1. Users listener
    const usersRef = ref(db, 'users');
    dataListeners.users = onValue(usersRef, (snapshot) => {
        if (snapshot.exists()) {
            allUsers = snapshot.val();
            console.log('✅ Users loaded:', Object.keys(allUsers).length);
            extractTransactionsFromUsers();
        } else {
            allUsers = {};
            allTransactions = [];
            allPackages = [];
        }
        if (isDataLoaded) renderDashboard();
    }, (error) => {
        console.error('Users listener error:', error);
        showToast('⚠️ Error loading users: ' + error.message, 'error');
    });

    // 2. Withdrawals listener - THIS IS THE KEY FIX!
    const withdrawalsRef = ref(db, 'withdrawals');
    dataListeners.withdrawals = onValue(withdrawalsRef, (snapshot) => {
        if (snapshot.exists()) {
            allWithdrawals = snapshot.val();
            console.log('✅ Withdrawals loaded from root node:', Object.keys(allWithdrawals).length);
            console.log('📊 Withdrawals data:', allWithdrawals);
        } else {
            allWithdrawals = {};
            console.log('⚠️ No withdrawals found in root node');
        }
        if (isDataLoaded) renderDashboard();
    }, (error) => {
        console.error('Withdrawals listener error:', error);
    });

    // 3. Deposits listener
    const depositsRef = ref(db, 'deposits');
    dataListeners.deposits = onValue(depositsRef, (snapshot) => {
        if (snapshot.exists()) {
            allDeposits = snapshot.val();
            console.log('✅ Deposits loaded from root node:', Object.keys(allDeposits).length);
        } else {
            allDeposits = {};
        }
        if (isDataLoaded) renderDashboard();
    }, (error) => {
        console.error('Deposits listener error:', error);
    });

    // 4. Settings listener
    const settingsRef = ref(db, 'settings');
    dataListeners.settings = onValue(settingsRef, (snapshot) => {
        if (snapshot.exists()) {
            allSettings = snapshot.val();
            console.log('✅ Settings loaded:', allSettings);
        } else {
            allSettings = { rate: 1.00 };
        }
        if (isDataLoaded) {
            const rateInput = document.getElementById('rndRate');
            const rateDisplay = document.getElementById('currentRateDisplay');
            if (rateInput && allSettings.rate) {
                rateInput.value = allSettings.rate;
                if (rateDisplay) rateDisplay.textContent = allSettings.rate;
            }
            renderDashboard();
        }
    });
    
    document.getElementById('dbStatus').className = 'db-status connected';
    document.getElementById('dbStatus').innerHTML = '<i class="bi bi-database"></i> Connected';
}

// ============================================================
// 🔥 EXTRACT TRANSACTIONS FROM USERS
// ============================================================
function extractTransactionsFromUsers() {
    allTransactions = [];
    allPackages = [];
    
    for (let uid in allUsers) {
        const user = allUsers[uid];
        if (user.role === 'admin') continue;
        
        const transactions = user.transactions || {};
        for (let txId in transactions) {
            const tx = transactions[txId];
            allTransactions.push({
                id: txId,
                uid: uid,
                user: user,
                source: 'user_transactions',
                ...tx
            });
        }
        
        const packages = user.packages || {};
        for (let pkgId in packages) {
            const pkg = packages[pkgId];
            allPackages.push({
                id: pkgId,
                uid: uid,
                user: user,
                ...pkg
            });
        }
    }
    
    allTransactions.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    allPackages.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    
    console.log('✅ Extracted transactions:', allTransactions.length);
    console.log('✅ Extracted packages:', allPackages.length);
}

// ============================================================
// 🔥 GET ALL WITHDRAWALS (Combined from root + user transactions)
// ============================================================
function getAllWithdrawals() {
    const combined = {};
    
    // 1. From root withdrawals node
    for (let key in allWithdrawals) {
        const w = allWithdrawals[key];
        const user = allUsers[w.uid] || { name: 'Unknown', username: 'N/A' };
        combined[key] = {
            id: key,
            source: 'root_withdrawals',
            user: user,
            ...w
        };
    }
    
    // 2. From user transactions
    for (let tx of allTransactions) {
        if (tx.type === 'withdrawal') {
            // Check if already exists in combined by matching amount + timestamp
            let exists = false;
            for (let key in combined) {
                const existing = combined[key];
                if (existing.uid === tx.uid && 
                    existing.amount === tx.amount && 
                    Math.abs((existing.timestamp || 0) - (tx.timestamp || 0)) < 10000) {
                    exists = true;
                    break;
                }
            }
            if (!exists) {
                const id = 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                combined[id] = {
                    id: id,
                    source: 'user_transactions',
                    uid: tx.uid,
                    user: tx.user || allUsers[tx.uid] || { name: 'Unknown' },
                    amount: tx.amount || 0,
                    currency: tx.currency || 'RND',
                    status: tx.status || 'pending',
                    timestamp: tx.timestamp || Date.now(),
                    wallet: tx.wallet || '',
                    walletType: tx.walletType || '',
                    description: tx.description || ''
                };
            }
        }
    }
    
    return combined;
}

// ============================================================
// 🔥 GET ALL DEPOSITS (Combined from root + user transactions + packages)
// ============================================================
function getAllDeposits() {
    const combined = {};
    
    // 1. From root deposits node
    for (let key in allDeposits) {
        const d = allDeposits[key];
        const user = allUsers[d.uid] || { name: 'Unknown', username: 'N/A' };
        combined[key] = {
            id: key,
            source: 'root_deposits',
            user: user,
            ...d
        };
    }
    
    // 2. From user transactions
    for (let tx of allTransactions) {
        if (tx.type === 'deposit' || tx.type === 'deposit_verified') {
            let exists = false;
            for (let key in combined) {
                const existing = combined[key];
                if (existing.uid === tx.uid && 
                    existing.amount === tx.amount && 
                    Math.abs((existing.timestamp || 0) - (tx.timestamp || 0)) < 10000) {
                    exists = true;
                    break;
                }
            }
            if (!exists) {
                const id = 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                combined[id] = {
                    id: id,
                    source: 'user_transactions',
                    uid: tx.uid,
                    user: tx.user || allUsers[tx.uid] || { name: 'Unknown' },
                    amount: tx.amount || 0,
                    currency: 'USDT',
                    status: tx.status || 'approved',
                    timestamp: tx.timestamp || Date.now(),
                    txHash: tx.txHash || '',
                    description: tx.description || '',
                    isPackage: false
                };
            }
        }
    }
    
    // 3. From packages
    for (let pkg of allPackages) {
        const id = 'pkg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4);
        combined[id] = {
            id: id,
            source: 'packages',
            uid: pkg.uid,
            user: pkg.user || allUsers[pkg.uid] || { name: 'Unknown' },
            amount: pkg.usdtAmount || 0,
            currency: 'USDT',
            status: 'approved',
            timestamp: pkg.timestamp || Date.now(),
            description: `${pkg.planName || 'Package'} - ${pkg.bonusPercent || 0}% Bonus`,
            isPackage: true,
            packageData: pkg
        };
    }
    
    return combined;
}

async function loadAdminPanel() {

            let attempts = 0;
            const checkData = () => {
                attempts++;
                const hasData = Object.keys(allUsers).length > 0 || attempts > 15;
                if (hasData) {
                    isDataLoaded = true;
                    resolve();

                <td><strong style="color:#2ecc71;">$${d.amount || 0}</strong></td>
                <td style="font-size:0.8rem;color:#8899bb;">
                    ${typeLabel}
                    ${details ? `<br><small>${details}</small>` : ''}
                    ${d.source ? `<br><small style="color:#556688;">${d.source}</small>` : ''}
                </td>
                <td style="font-size:0.8rem;color:#8899bb;">${new Date(d.timestamp).toLocaleString('hi-IN')}</td>
                <td><span class="${statusClass}">${statusText}</span></td>
            </tr>
        `;
    }

    html += `</tbody></table></div></div>`;
    return html;
}

// ============================================================
// 🔥 RENDER WITHDRAWALS TAB - KEY FIX
// ============================================================
function renderWithdrawalsTab() {
    const allWithdrawalsCombined = getAllWithdrawals();
    const withdrawalList = Object.values(allWithdrawalsCombined);
    withdrawalList.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    
    console.log('📊 Rendering withdrawals:', withdrawalList.length);
    
    if (withdrawalList.length === 0) {
        return `
            <div class="card-glass">
                <div class="no-data">
                    <i class="bi bi-inbox"></i>
                    <p>No withdrawals found.</p>
                    <p class="text-muted small">Check if withdrawals exist in Firebase /withdrawals node or in user transactions.</p>
                </div>
            </div>
        `;
    }

    let html = `
        <div class="card-glass">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
                <div class="card-title" style="margin-bottom:0;"><i class="bi bi-arrow-up-circle text-success me-2"></i>All Withdrawals (${withdrawalList.length})</div>
                <input type="text" class="search-box" placeholder="Search by user..." oninput="filterWithdrawals(this.value)">
            </div>
            <div class="table-responsive">
                <table class="table table-custom" id="withdrawalsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>User</th>
                            <th>Amount</th>
                            <th>Wallet</th>
                            <th>Wallet Type</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
    `;

    let count = 0;
    for (let w of withdrawalList) {
        count++;
        const user = w.user || allUsers[w.uid] || { name: 'Unknown', username: 'N/A' };
        const statusClass = w.status === 'pending' ? 'badge-pending' : w.status === 'approved' || w.status === 'success' ? 'badge-approved' : 'badge-rejected';
        const statusText = w.status === 'pending' ? '⏳ Pending' : w.status === 'approved' || w.status === 'success' ? '✅ Approved' : '❌ Rejected';
        const currency = w.currency || 'USDT';
        const walletDisplay = w.wallet ? w.wallet.substring(0, 20) + '...' : 'N/A';
        const walletType = w.walletType || w.walletType || '';
        const source = w.source || '';
        
        html += `
            <tr data-user="${(user.username || user.name || '').toLowerCase()}">
                <td>${count}</td>
                <td>
                    <strong>${user.name || 'Unknown'}</strong><br>
                    <small style="color:#556688;">${user.username || 'N/A'}</small>
                    ${source ? `<br><small style="color:#556688;font-size:0.6rem;">${source}</small>` : ''}
                </td>
                <td><strong style="color:#fbbf24;">${w.amount || 0} ${currency}</strong></td>
                <td>
                    <span class="wallet-address-cell">${walletDisplay}</span>
                    ${w.wallet ? `<button class="btn-copy ms-1" onclick="copyAddress('${w.wallet}','Wallet')"><i class="bi bi-clipboard"></i></button>` : ''}
                </td>
                <td style="font-size:0.8rem;color:#8899bb;">${walletType || 'N/A'}</td>
                <td style="font-size:0.8rem;color:#8899bb;">${new Date(w.timestamp).toLocaleString('hi-IN')}</td>
                <td><span class="${statusClass}">${statusText}</span></td>
                <td>
                    ${w.status === 'pending' ? `
                        <button class="btn btn-success-custom btn-sm me-1" onclick="approveWithdrawal('${w.id}')"><i class="bi bi-check-lg"></i></button>
                        <button class="btn btn-danger-custom btn-sm" onclick="rejectWithdrawal('${w.id}')"><i class="bi bi-x-lg"></i></button>
                    ` : w.status === 'approved' || w.status === 'success' ? `
                        <button class="btn btn-warning-custom btn-sm" onclick="reverseWithdrawal('${w.id}')"><i class="bi bi-arrow-counterclockwise"></i></button>
                    ` : `
                        <button class="btn btn-warning-custom btn-sm" onclick="reverseWithdrawal('${w.id}')"><i class="bi bi-arrow-counterclockwise"></i></button>
                    `}
                </td>
            </tr>
        `;
    }

    html += `</tbody></table></div></div>`;
    return html;
}

// ============================================================
// 🔥 WITHDRAWAL ACTIONS - MANUAL APPROVAL
// ============================================================
window.approveWithdrawal = async function(wId) {
    if (!confirm('✅ Approve this withdrawal?')) return;
    try {
        const allWithdrawalsCombined = getAllWithdrawals();
        const w = allWithdrawalsCombined[wId];
        if (!w) { showToast('❌ Withdrawal not found!', 'error'); return; }
        
        console.log('Approving withdrawal:', w);
        
        // If from root node, update root node
        if (w.source === 'root_withdrawals') {
            await update(ref(db, 'withdrawals/' + wId), { status: 'approved' });
            showToast('✅ Withdrawal approved from root node!', 'success');
        } else {
            // From user transactions
            const userRef = ref(db, 'users/' + w.uid);
            const userSnap = await get(userRef);
            if (!userSnap.exists()) { showToast('❌ User not found!', 'error'); return; }
            
            const userData = userSnap.val();
            const transactions = userData.transactions || {};
            
            let found = false;
            for (let key in transactions) {
                if (transactions[key].type === 'withdrawal' && 
                    transactions[key].amount === w.amount && 
                    Math.abs((transactions[key].timestamp || 0) - (w.timestamp || 0)) < 5000) {
                    transactions[key].status = 'approved';
                    found = true;
                    break;
                }
            }
            
            if (found) {
                await update(ref(db, 'users/' + w.uid), { transactions: transactions });
                showToast('✅ Withdrawal approved from user transactions!', 'success');
            } else {
                showToast('⚠️ Could not find transaction in user data.', 'error');
            }
        }
        
        // Refresh data
        extractTransactionsFromUsers();
        renderDashboard();
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
        console.error('Approve error:', error);
    }
};

window.rejectWithdrawal = async function(wId) {
    if (!confirm('❌ Reject this withdrawal?')) return;
    try {
        const allWithdrawalsCombined = getAllWithdrawals();
        const w = allWithdrawalsCombined[wId];
        if (!w) { showToast('❌ Withdrawal not found!', 'error'); return; }
        
        console.log('Rejecting withdrawal:', w);
        
        if (w.source === 'root_withdrawals') {
            await update(ref(db, 'withdrawals/' + wId), { status: 'rejected' });
            showToast('❌ Withdrawal rejected from root node!', 'success');
        } else {
            const userRef = ref(db, 'users/' + w.uid);
            const userSnap = await get(userRef);
            if (!userSnap.exists()) { showToast('❌ User not found!', 'error'); return; }
            
            const userData = userSnap.val();
            const transactions = userData.transactions || {};
            
            let found = false;
            for (let key in transactions) {
                if (transactions[key].type === 'withdrawal' && 
                    transactions[key].amount === w.amount && 
                    Math.abs((transactions[key].timestamp || 0) - (w.timestamp || 0)) < 5000) {
                    transactions[key].status = 'rejected';
                    found = true;
                    break;
                }
            }
            
            if (found) {
                await update(ref(db, 'users/' + w.uid), { transactions: transactions });
                showToast('❌ Withdrawal rejected from user transactions!', 'success');
            } else {
                showToast('⚠️ Could not find transaction in user data.', 'error');
            }
        }
        
        extractTransactionsFromUsers();
        renderDashboard();
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
        console.error('Reject error:', error);
    }
};

window.reverseWithdrawal = async function(wId) {
    if (!confirm('🔄 Reverse this withdrawal?')) return;
    try {
        const allWithdrawalsCombined = getAllWithdrawals();
        const w = allWithdrawalsCombined[wId];
        if (!w) { showToast('❌ Withdrawal not found!', 'error'); return; }
        
        console.log('Reversing withdrawal:', w);
        
        // Add amount back to user's wallet
        const userRef = ref(db, 'users/' + w.uid);
        const userSnap = await get(userRef);
        if (!userSnap.exists()) { showToast('❌ User not found!', 'error'); return; }
        
        const userData = userSnap.val();
        const walletType = w.walletType || 'withdrawalWallet';
        const currentBalance = userData[walletType] || 0;
        const newBalance = currentBalance + (w.amount || 0);
        
        await update(userRef, { [walletType]: newBalance });
        
        if (w.source === 'root_withdrawals') {
            await update(ref(db, 'withdrawals/' + wId), { status: 'pending' });
        } else {
            const transactions = userData.transactions || {};
            for (let key in transactions) {
                if (transactions[key].type === 'withdrawal' && 
                    transactions[key].amount === w.amount && 
                    Math.abs((transactions[key].timestamp || 0) - (w.timestamp || 0)) < 5000) {
                    transactions[key].status = 'pending';
                    break;
                }
            }
            await update(ref(db, 'users/' + w.uid), { transactions: transactions });
        }
        
        showToast('🔄 Withdrawal reversed! Amount added back to wallet.', 'success');
        extractTransactionsFromUsers();
        renderDashboard();
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
        console.error('Reverse error:', error);
    }
};

// ============================================================
// 🔥 SAVE SETTINGS
// ============================================================
async function saveSettings() {
    const rateInput = document.getElementById('rndRate');
    if (!rateInput) {
        showToast('❌ Settings form not found!', 'error');
        return;
    }
    
    const rate = parseFloat(rateInput.value);
    if (!rate || rate <= 0) {
        showToast('❌ Please enter a valid rate.', 'error');
        return;
    }
    
    const btn = document.getElementById('saveSettingsBtn');
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
    }
    
    try {
        await set(ref(db, 'settings/rate'), rate);
        const display = document.getElementById('currentRateDisplay');
        if (display) display.textContent = rate;
        showToast('✅ RND rate updated to $' + rate, 'success');
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
    }
    
    if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-save me-2"></i>Update Rate';
    }
}
