<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Panel - RND Staking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080e1a; color: #f0f4ff; min-height: 100vh; }
        
        .navbar-custom {
            background: rgba(8,14,26,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(46,204,113,0.15);
            padding: 10px 0;
            position: sticky;
            top: 0;
            z-index: 1050;
        }
        .navbar-custom .navbar-brand { font-weight: 800; font-size: 1.2rem; color: #fff !important; }
        .navbar-custom .navbar-brand i { color: #2ecc71; }
        .admin-badge {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.65rem;
            color: #f87171;
            font-weight: 600;
        }
        
        .dashboard-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .card-glass {
            background: rgba(19,34,55,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.1);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .card-glass:hover { border-color: rgba(46,204,113,0.3); transform: translateY(-3px); }
        .card-glass .card-title { font-size: 1rem; font-weight: 600; color: #fff; margin-bottom: 15px; }
        .card-glass .card-title i { color: #2ecc71; margin-right: 8px; }
        
        .stat-card {
            background: rgba(19,34,55,0.6);
            border: 1px solid rgba(46,204,113,0.08);
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.3s ease;
            text-align: center;
        }
        .stat-card:hover { border-color: rgba(46,204,113,0.2); transform: translateY(-3px); }
        .stat-card .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin: 0 auto 10px;
        }
        .stat-card .stat-icon.green { background: rgba(46,204,113,0.12); color: #2ecc71; }
        .stat-card .stat-icon.blue { background: rgba(59,130,246,0.12); color: #60a5fa; }
        .stat-card .stat-icon.orange { background: rgba(251,191,36,0.12); color: #fbbf24; }
        .stat-card .stat-icon.red { background: rgba(239,68,68,0.12); color: #f87171; }
        .stat-card .stat-icon.purple { background: rgba(139,92,246,0.12); color: #a78bfa; }
        .stat-card .stat-number { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .stat-card .stat-label { color: #8899bb; font-size: 0.8rem; font-weight: 500; margin-top: 4px; }
        
        .table-custom { color: #f0f4ff; border-color: #1f334f; }
        .table-custom th { border-bottom: 2px solid #2a3a5a; color: #a0b8d0; font-weight: 600; }
        .table-custom td { border-color: #1f334f; vertical-align: middle; }
        .table-custom tr:hover { background: rgba(46,204,113,0.03); }
        
        .btn-success-custom {
            background: #2ecc71;
            border: none;
            color: #0b1120;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        .btn-success-custom:hover { background: #27ae60; color: #fff; transform: translateY(-1px); }
        
        .btn-danger-custom {
            background: #ef4444;
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        .btn-danger-custom:hover { background: #dc2626; color: #fff; transform: translateY(-1px); }
        
        .btn-warning-custom {
            background: #fbbf24;
            border: none;
            color: #0b1120;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }
        .btn-warning-custom:hover { background: #f59e0b; color: #fff; transform: translateY(-1px); }
        
        .btn-primary-custom {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(46,204,113,0.3); color: #fff; }
        
        .badge-pending { background: rgba(251,191,36,0.15); color: #fbbf24; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .badge-approved { background: rgba(46,204,113,0.15); color: #2ecc71; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        .badge-rejected { background: rgba(239,68,68,0.15); color: #f87171; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
        
        .search-box {
            background: rgba(8,14,26,0.6);
            border: 1px solid rgba(46,204,113,0.1);
            border-radius: 12px;
            padding: 8px 16px;
            color: #f0f4ff;
            width: 100%;
            max-width: 300px;
        }
        .search-box:focus { border-color: #2ecc71; outline: none; box-shadow: 0 0 0 3px rgba(46,204,113,0.1); }
        .search-box::placeholder { color: #556688; }
        
        .nav-tabs-custom .nav-link {
            color: #8899bb;
            border: none;
            padding: 10px 20px;
            font-weight: 500;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .nav-tabs-custom .nav-link:hover { color: #fff; background: rgba(46,204,113,0.05); }
        .nav-tabs-custom .nav-link.active { color: #2ecc71; background: rgba(46,204,113,0.1); }
        .nav-tabs-custom .nav-link i { margin-right: 8px; }
        
        .form-control-custom {
            background: rgba(8,14,26,0.8) !important;
            border: 1px solid rgba(46,204,113,0.15) !important;
            color: #f0f4ff !important;
            padding: 12px 16px !important;
            border-radius: 12px !important;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        .form-control-custom:focus {
            border-color: #2ecc71 !important;
            box-shadow: 0 0 0 3px rgba(46,204,113,0.15) !important;
            background: rgba(8,14,26,0.9) !important;
        }
        .form-control-custom::placeholder { color: #556688 !important; }
        .form-label { font-weight: 600; color: #a0b8d0; font-size: 0.9rem; margin-bottom: 6px; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(46,204,113,0.06);
        }
        .info-row .label { color: #8899bb; font-size: 0.85rem; }
        .info-row .value { color: #f0f4ff; font-weight: 500; font-size: 0.95rem; }
        
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }
        .toast-custom {
            background: rgba(19,34,55,0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46,204,113,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: #f0f4ff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.4s ease;
            margin-bottom: 10px;
        }
        .toast-custom.success { border-left: 4px solid #2ecc71; }
        .toast-custom.error { border-left: 4px solid #ef4444; }
        .toast-custom i { font-size: 1.5rem; }
        .toast-custom .toast-msg { flex: 1; font-size: 0.9rem; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
        
        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #080e1a 0%, #0f1f3a 50%, #1a2a4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
        }
        .password-screen .card-glass { max-width: 420px; width: 100%; padding: 2.5rem; }
        .password-screen .logo-text { font-size: 1.8rem; font-weight: 800; color: #fff; }
        .password-screen .logo-text span { color: #2ecc71; }
        .password-screen .logo-text .admin-badge {
            font-size: 0.7rem;
            background: rgba(239,68,68,0.15);
            color: #f87171;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .error-shake { animation: shake 0.5s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        
        .db-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .db-status.connected { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .db-status.error { background: rgba(239,68,68,0.15); color: #f87171; }
        .db-status.loading { background: rgba(251,191,36,0.15); color: #fbbf24; }
        
        @media (max-width: 768px) {
            .dashboard-container { padding: 15px; }
            .search-box { max-width: 100%; }
            .table-responsive { font-size: 0.8rem; }
            .stat-card .stat-number { font-size: 1.3rem; }
        }
        @media (max-width: 480px) { .card-glass { padding: 1rem; } }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ====== PASSWORD SCREEN ====== -->
<div class="password-screen" id="passwordScreen">
    <div class="card-glass text-center">
        <div class="logo-text mb-3">
            <i class="bi bi-currency-bitcoin me-2"></i>RND<span>Staking</span>
            <span class="admin-badge"><i class="bi bi-shield-lock"></i> Admin</span>
        </div>
        <p class="text-muted small mb-4">Enter admin password to access panel</p>
        
        <form id="passwordForm">
            <div class="mb-3">
                <input type="password" id="adminPasswordInput" class="form-control form-control-custom" 
                       placeholder="Enter admin password" autofocus>
            </div>
            <button type="submit" class="btn-primary-custom" id="passwordSubmitBtn">
                <i class="bi bi-shield-lock me-2"></i>Access Panel
            </button>
        </form>
        <p class="text-muted small mt-3">
            <i class="bi bi-info-circle me-1"></i> Password: 123@Admin
        </p>
    </div>
</div>

<!-- ====== NAVBAR ====== -->
<nav class="navbar navbar-custom" id="mainNav" style="display:none;">
    <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-currency-bitcoin me-2"></i>RND Staking
            <span class="admin-badge ms-2"><i class="bi bi-shield-lock"></i> Admin Panel</span>
        </a>
        <div class="d-flex align-items-center gap-3">
            <span id="dbStatus" class="db-status loading"><i class="bi bi-database"></i> Connecting...</span>
            <button class="btn btn-danger-custom btn-sm" id="logoutBtn">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </div>
</nav>

<!-- ====== ADMIN CONTENT ====== -->
<div class="dashboard-container" id="adminContent" style="display:none;">
    <div class="loading-spinner">
        <div class="spinner-border text-success" role="status" style="width: 3rem; height: 3rem;"></div>
        <p class="text-muted mt-3">Loading admin panel...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { getDatabase, ref, get, update, set, onValue } from "firebase/database";

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyAz-TLmOhiy-_vHHmIjW8gyIOqTR_PT9o0",
    authDomain: "rnd2-70080.firebaseapp.com",
    databaseURL: "https://rnd2-70080-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "rnd2-70080",
    storageBucket: "rnd2-70080.firebasestorage.app",
    messagingSenderId: "468625887938",
    appId: "1:468625887938:web:5cb4ddbcf31b6fc0a4615b",
    measurementId: "G-ELVJD5NQKB"
};

// ============================================================
// 🔥 ADMIN PASSWORD
// ============================================================
const ADMIN_PASSWORD = "123@Admin";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentTab = 'deposits';
let allUsers = {};
let allDeposits = {};
let allWithdrawals = {};
let isSettingsListenerAdded = false;

function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast-custom ${type}`;
    const icon = type === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger';
    toast.innerHTML = `<i class="bi ${icon}"></i><span class="toast-msg">${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
    }, 5000);
}

// ============================================================
// 🔥 DATABASE CONNECTION CHECK
// ============================================================
function checkDatabaseConnection() {
    const statusEl = document.getElementById('dbStatus');
    if (!statusEl) return;
    statusEl.className = 'db-status loading';
    statusEl.innerHTML = '<i class="bi bi-database"></i> Connecting...';
    
    const testRef = ref(db, '.info/connected');
    onValue(testRef, (snap) => {
        if (snap.val() === true) {
            statusEl.className = 'db-status connected';
            statusEl.innerHTML = '<i class="bi bi-database"></i> Connected';
            console.log('✅ Firebase Connected!');
        } else {
            statusEl.className = 'db-status error';
            statusEl.innerHTML = '<i class="bi bi-database"></i> Disconnected';
            console.log('❌ Firebase Disconnected!');
        }
    }, (error) => {
        console.error('Connection error:', error);
        statusEl.className = 'db-status error';
        statusEl.innerHTML = '<i class="bi bi-database"></i> Error';
    });
}

// ============================================================
// 🔥 PASSWORD CHECK
// ============================================================
function checkPassword() {
    const saved = sessionStorage.getItem('admin_authenticated');
    if (saved === 'true') {
        document.getElementById('passwordScreen').style.display = 'none';
        document.getElementById('mainNav').style.display = 'flex';
        document.getElementById('adminContent').style.display = 'block';
        checkDatabaseConnection();
        loadAdminPanel();
    }
}

document.getElementById('passwordForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const input = document.getElementById('adminPasswordInput');
    const btn = document.getElementById('passwordSubmitBtn');
    
    if (input.value === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin_authenticated', 'true');
        document.getElementById('passwordScreen').style.display = 'none';
        document.getElementById('mainNav').style.display = 'flex';
        document.getElementById('adminContent').style.display = 'block';
        checkDatabaseConnection();
        showToast('✅ Access Granted! Welcome Admin.', 'success');
        loadAdminPanel();
    } else {
        input.classList.add('error-shake');
        setTimeout(() => input.classList.remove('error-shake'), 500);
        input.value = '';
        input.focus();
        showToast('❌ Incorrect Password! Please try again.', 'error');
    }
});

document.getElementById('adminPasswordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('passwordForm').dispatchEvent(new Event('submit'));
    }
});

// ============================================================
// 🔥 LOGOUT
// ============================================================
document.getElementById('logoutBtn').addEventListener('click', function() {
    sessionStorage.removeItem('admin_authenticated');
    document.getElementById('passwordScreen').style.display = 'flex';
    document.getElementById('mainNav').style.display = 'none';
    document.getElementById('adminContent').style.display = 'none';
    document.getElementById('adminPasswordInput').value = '';
    document.getElementById('adminPasswordInput').focus();
    showToast('🔒 Logged out successfully.', 'success');
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        const isLoggedIn = sessionStorage.getItem('admin_authenticated') === 'true';
        if (isLoggedIn && document.getElementById('mainNav').style.display !== 'none') {
            document.getElementById('logoutBtn').click();
        }
    }
});

// ============================================================
// 🔥 FETCH ALL DATA
// ============================================================
async function fetchAllData() {
    try {
        const statusEl = document.getElementById('dbStatus');
        if (statusEl) {
            statusEl.className = 'db-status loading';
            statusEl.innerHTML = '<i class="bi bi-database"></i> Loading...';
        }
        
        const usersSnap = await get(ref(db, 'users'));
        if (usersSnap.exists()) {
            allUsers = usersSnap.val();
            console.log('✅ Users loaded:', Object.keys(allUsers).length);
        } else {
            allUsers = {};
            console.log('⚠️ No users found');
        }

        const depositsSnap = await get(ref(db, 'deposits'));
        if (depositsSnap.exists()) {
            allDeposits = depositsSnap.val();
            console.log('✅ Deposits loaded:', Object.keys(allDeposits).length);
        } else {
            allDeposits = {};
            console.log('⚠️ No deposits found');
        }

        const withdrawalsSnap = await get(ref(db, 'withdrawals'));
        if (withdrawalsSnap.exists()) {
            allWithdrawals = withdrawalsSnap.val();
            console.log('✅ Withdrawals loaded:', Object.keys(allWithdrawals).length);
        } else {
            allWithdrawals = {};
            console.log('⚠️ No withdrawals found');
        }

        if (statusEl) {
            statusEl.className = 'db-status connected';
            statusEl.innerHTML = '<i class="bi bi-database"></i> Connected';
        }
        
        return true;
    } catch (error) {
        console.error('❌ Error fetching data:', error);
        const statusEl = document.getElementById('dbStatus');
        if (statusEl) {
            statusEl.className = 'db-status error';
            statusEl.innerHTML = '<i class="bi bi-database"></i> Error';
        }
        showToast('❌ Database Error: ' + error.message, 'error');
        return false;
    }
}

// ============================================================
// 🔥 LOAD ADMIN PANEL
// ============================================================
async function loadAdminPanel() {
    try {
        const success = await fetchAllData();
        
        if (!success) {
            document.getElementById('adminContent').innerHTML = `
                <div class="text-center py-5">
                    <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                    <h4>Database Connection Error</h4>
                    <p class="text-muted">Please check Firebase Realtime Database Rules.</p>
                    <div class="card-glass mt-3 text-start" style="max-width:600px;margin:0 auto;">
                        <h6 class="text-warning">🔧 How to Fix:</h6>
                        <ol class="text-muted" style="font-size:0.9rem;line-height:2;">
                            <li>Go to <strong>Firebase Console → Realtime Database → Rules</strong></li>
                            <li>Set rules to: <br>
                                <code style="background:#0b1120;display:block;padding:10px;border-radius:8px;font-size:0.75rem;color:#2ecc71;">
                                { "rules": { ".read": true, ".write": true } }
                                </code>
                            </li>
                            <li>Click <strong>Publish</strong> button</li>
                            <li>Refresh this page</li>
                        </ol>
                    </div>
                    <button class="btn btn-primary-custom mt-3" onclick="location.reload()">
                        <i class="bi bi-arrow-clockwise me-2"></i>Refresh
                    </button>
                </div>
            `;
            return;
        }
        
        try {
            const rateSnap = await get(ref(db, 'settings/rate'));
            const rndRateInput = document.getElementById('rndRate');
            const rateDisplay = document.getElementById('currentRateDisplay');
            if (rateSnap.exists() && rndRateInput) {
                rndRateInput.value = rateSnap.val();
                if (rateDisplay) rateDisplay.textContent = rateSnap.val();
            }
        } catch (e) {
            console.log('Rate not found, using default');
        }

        renderDashboard();

        // 🔥 FIX: Settings form listener - SAFELY CHECK IF ELEMENT EXISTS
        setTimeout(() => {
            const settingsForm = document.getElementById('settingsForm');
            if (settingsForm) {
                settingsForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await saveSettings();
                });
                console.log('✅ Settings form listener added');
            } else {
                console.log('⚠️ Settings form not found, will try again later');
            }
        }, 500);

    } catch (error) {
        console.error('Error loading admin:', error);
        document.getElementById('adminContent').innerHTML = `
            <div class="text-center py-5">
                <i class="bi bi-exclamation-triangle text-danger fs-1 d-block mb-3"></i>
                <h4>Error Loading Panel</h4>
                <p class="text-muted">${error.message || 'Please check your internet connection.'}</p>
                <button class="btn btn-primary-custom mt-3" onclick="location.reload()">Refresh</button>
            </div>
        `;
    }
}

// ============================================================
// 🔥 RENDER DASHBOARD
// ============================================================
function renderDashboard() {
    const totalUsers = Object.keys(allUsers || {}).length;
    const totalDeposits = Object.keys(allDeposits || {}).length;
    const totalWithdrawals = Object.keys(allWithdrawals || {}).length;
    
    let pendingDeposits = 0;
    let totalDepositAmount = 0;
    
    for (let key in allDeposits) {
        const d = allDeposits[key];
        if (d.status === 'pending') pendingDeposits++;
        if (d.status === 'approved') totalDepositAmount += (d.amount || 0);
    }
    
    let pendingWithdrawals = 0;
    for (let key in allWithdrawals) {
        const w = allWithdrawals[key];
        if (w.status === 'pending') pendingWithdrawals++;
    }

    document.getElementById('adminContent').innerHTML = `
        <div class="row g-4">
            <div class="col-12">

// 🔥 RENDER DEPOSITS TAB
// ============================================================
function renderDepositsTab() {
    const depositList = Object.keys(allDeposits || {});
    if (depositList.length === 0) {
        return `
            <div class="card-glass text-center py-4">
                <i class="bi bi-inbox fs-1 d-block mb-2" style="color:#556688;"></i>
                <p class="text-muted">No deposits found.</p>
            </div>
        `;
    }

    let html = `
        <div class="card-glass">
            <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
                <div class="card-title" style="margin-bottom:0;"><i class="bi bi-arrow-down-circle text-success me-2"></i>All Deposits</div>
                <input type="text" class="search-box" placeholder="Search by user..." oninput="filterDeposits(this.value)">
            </div>
            <div class="table-responsive">
                <table class="table table-custom" id="depositsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>User</th>
                            <th>Amount</th>
                            <th>Tx Hash</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
    `;

    let count = 0;
    const sortedKeys = Object.keys(allDeposits).sort((a, b) => (allDeposits[b].timestamp || 0) - (allDeposits[a].timestamp || 0));
    for (let key of sortedKeys) {
        const d = allDeposits[key];
        count++;
        const user = allUsers[d.uid] || { name: 'Unknown', username: 'N/A' };
        const statusClass = d.status === 'pending' ? 'badge-pending' : d.status === 'approved' ? 'badge-approved' : 'badge-rejected';
        const statusText = d.status === 'pending' ? '⏳ Pending' : d.status === 'approved' ? '✅ Approved' : '❌ Rejected';
        
        html += `
            <tr data-user="${(user.username || user.name || '').toLowerCase()}">
                <td>${count}</td>
                <td>
                    <strong>${user.name || 'Unknown'}</strong><br>
                    <small style="color:#556688;">${user.username || 'N/A'}</small>
                </td>
                <td><strong style="color:#2ecc71;">$${d.amount || 0}</strong></td>
                <td style="font-family:monospace;font-size:0.7rem;color:#556688;">${d.txHash ? d.txHash.substring(0,15)+'...' : 'N/A'}</td>
                <td style="font-size:0.8rem;color:#8899bb;">${new Date(d.timestamp).toLocaleString('hi-IN')}</td>
                <td><span class="${statusClass}">${statusText}</span></td>
                <td>
                    ${d.status === 'pending' ? `
                        <button class="btn btn-success-custom btn-sm me-1" onclick="approveDeposit('${key}')"><i class="bi bi-check-lg"></i></button>
                        <button class="btn btn-danger-custom btn-sm" onclick="rejectDeposit('${key}')"><i class="bi bi-x-lg"></i></button>
                    ` : d.status === 'approved' ? `
                        <button class="btn btn-warning-custom btn-sm" onclick="reverseDeposit('${key}')"><i class="bi bi-arrow-counterclockwise"></i></button>
                    ` : `
                        <button class="btn btn-warning-custom btn-sm" onclick="reverseDeposit('${key}')"><i class="bi bi-arrow-counterclockwise"></i></button>
                    `}
                </td>
            </tr>
        `;
    }

    html += `</tbody></table></div></div>`;
    return html;
}

// 🔥 FILTER FUNCTIONS
// ============================================================
window.filterDeposits = function(value) {
    const rows = document.querySelectorAll('#depositsTable tbody tr');
    const search = value.toLowerCase();
    rows.forEach(row => {
        const user = row.getAttribute('data-user') || '';
        row.style.display = user.includes(search) ? '' : 'none';
    });
};

window.filterWithdrawals = function(value) {
    const rows = document.querySelectorAll('#withdrawalsTable tbody tr');
    const search = value.toLowerCase();
    rows.forEach(row => {
        const user = row.getAttribute('data-user') || '';
        row.style.display = user.includes(search) ? '' : 'none';
    });
};

window.filterUsers = function(value) {
    const rows = document.querySelectorAll('#usersTable tbody tr');
    const search = value.toLowerCase();
    rows.forEach(row => {
        const user = row.getAttribute('data-user') || '';
        row.style.display = user.includes(search) ? '' : 'none';
    });
};

// ============================================================
// 🔥 DEPOSIT ACTIONS
// ============================================================
window.approveDeposit = async function(depositId) {
    if (!confirm('✅ Approve this deposit? The amount will be added to user\'s deposit wallet.')) return;
    
    try {
        const deposit = allDeposits[depositId];
        if (!deposit) { showToast('❌ Deposit not found!', 'error'); return; }
        
        const userRef = ref(db, 'users/' + deposit.uid);
        const userSnap = await get(userRef);
        if (!userSnap.exists()) { showToast('❌ User not found!', 'error'); return; }
        
        const userData = userSnap.val();
        const currentBalance = userData.depositWallet || 0;
        const newBalance = currentBalance + (deposit.amount || 0);
        
        await update(userRef, { depositWallet: newBalance });
        await update(ref(db, 'deposits/' + depositId), { status: 'approved' });
        
        showToast('✅ Deposit approved! Added $' + deposit.amount + ' to user\'s wallet.', 'success');
        await fetchAllData();
        renderDashboard();
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
    }
};

window.rejectDeposit = async function(depositId) {
    if (!confirm('❌ Reject this deposit?')) return;
    try {
        await update(ref(db, 'deposits/' + depositId), { status: 'rejected' });
        showToast('❌ Deposit rejected.', 'success');
        await fetchAllData();
        renderDashboard();
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
    }
};

window.reverseDeposit = async function(depositId) {
    if (!confirm('🔄 Reverse this deposit? This will remove the amount from user\'s wallet.')) return;
    
    try {
        const deposit = allDeposits[depositId];
        if (!deposit) { showToast('❌ Deposit not found!', 'error'); return; }
        
        const userRef = ref(db, 'users/' + deposit.uid);
        const userSnap = await get(userRef);
        if (!userSnap.exists()) { showToast('❌ User not found!', 'error'); return; }
        
        const userData = userSnap.val();
        const currentBalance = userData.depositWallet || 0;
        const newBalance = Math.max(0, currentBalance - (deposit.amount || 0));
        
        await update(userRef, { depositWallet: newBalance });
        await update(ref(db, 'deposits/' + depositId), { status: 'pending' });
        
        showToast('🔄 Deposit reversed. Amount removed from user\'s wallet.', 'success');
        await fetchAllData();
        renderDashboard();
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
    }
};

    try {

        const currentBalance = userData[walletType] || 0;

        await update(userRef, { [walletType]: newBalance });
        await update(ref(db, 'withdrawals/' + withdrawalId), { status: 'approved' });
        
        showToast('✅ Withdrawal approved! Deducted ' + withdrawal.amount + ' from user\'s wallet.', 'success');

// ============================================================
// 🔥 SETTINGS - UPDATE RATE
// ============================================================
async function saveSettings() {
    const rateInput = document.getElementById('rndRate');
    if (!rateInput) {
        showToast('❌ Settings form not found!', 'error');
        return;
    }
    
    const rate = parseFloat(rateInput.value);
    if (!rate || rate <= 0) {
        showToast('❌ Please enter a valid rate.', 'error');
        return;
    }
    
    const btn = document.getElementById('saveSettingsBtn');
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
    }
    
    try {
        await set(ref(db, 'settings/rate'), rate);
        const display = document.getElementById('currentRateDisplay');
        if (display) display.textContent = rate;
        showToast('✅ RND rate updated to $' + rate + ' successfully!', 'success');
    } catch (error) {
        showToast('❌ Error: ' + error.message, 'error');
    }
    
    if (btn) {
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-save me-2"></i>Update Rate';
    }
}
